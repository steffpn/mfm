services:
  db:
    image: timescale/timescaledb:latest-pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mfm
      POSTGRES_PASSWORD: mfm_local
      POSTGRES_DB: myfuckingmusic
      TS_TUNE_MAX_BG_WORKERS: 16
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mfm -d myfuckingmusic"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mfm:mfm_local@db:5432/myfuckingmusic
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    volumes:
      - ./data/streams:/app/data/streams
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  supervisor:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "--import", "tsx", "src/services/supervisor/index.ts"]
    environment:
      DATABASE_URL: postgresql://mfm:mfm_local@db:5432/myfuckingmusic
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    volumes:
      - ./data/streams:/app/data/streams
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  pgdata:
  redisdata:
